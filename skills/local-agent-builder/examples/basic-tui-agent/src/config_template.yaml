api:
  openai_base_url: http://localhost:8080/v1
  openai_model: local-model
  # Embedding endpoint for RAG vector search. Defaults to same as LLM endpoint.
  # Remove these lines if your project does not use RAG.
  embedding_base_url: http://localhost:8080/v1
  embedding_model: local-model
settings:
  enable_thinking: false
  concurrency:
    max_concurrent_tasks: 2
  quotas:
    # IMPORTANT: Quotas are GLOBAL (shared across ALL agents in the system).
    # Each key MUST be unique — duplicate YAML keys silently overwrite earlier ones!
    # The engine auto-injects these as prompt format variables: {key_quota}
    # e.g. "web_search: 10" becomes {web_search_quota} = 10 in your prompts.
    # Both flat integers and dict-with-limit are supported.
    delegate_tasks: 3
    fetch_url_to_workspace: 5
    write_workspace_file: 20
    read_workspace_file:
      limit: 50
      rules:
        max_lines: 300
    grep_workspace_file:
      limit: 50
      rules:
        max_matches: 10
    # RAG tool quotas — remove these if your project does not use RAG.
    semantic_search: 20
    keyword_search: 20
    list_library_files: 10
    read_library_file:
      limit: 50
      rules:
        max_lines: 500
  enable_conversational_memory: true
  enable_session_persistence: true
  workspace:
    type: memory
    dir: "~/.{APP_NAME}/workspace"
    session_isolation: false  # Set to true to auto-create timestamped run folders (e.g. run_1748192400/)
    required_artifact: null   # Enforce the creation of this file (e.g. "final_report.md") before exiting in headless mode
  # RAG configuration — remove this block if your project does not use RAG.
  rag:
    enabled: false                           # Toggle RAG features on/off
    library_dir: "~/.{APP_NAME}/libraries"   # Directory containing documents to index
    chunk_size: 1000                         # Characters per chunk (semchunk)
    chunk_overlap: 150                       # Overlap between chunks
    search_results: 5                        # Default k for semantic search
  permissions:
    run_shell_command: require_approval
    remove_workspace_file: require_approval
  shell:
    sandbox:
      enabled: false             # Enables Anthropic SRT wrap
      env_whitelist:
        - "PATH"
        - "HOME"
        - "TERM"
      network_domains: []        # E.g., github.com. Empty means airgapped! Use ["*"] to allow all domains.
      deny_workspace_patterns:   # Resolved to absolute paths for SRT constraints
        - "**/*.env"
