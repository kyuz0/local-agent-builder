api:
  openai_base_url: http://localhost:8080/v1
  openai_model: local-model
settings:
  enable_thinking: true
  quotas:
    fetch_url_to_workspace: 5
    write_workspace_file: 20
    read_workspace_file:
      limit: 50
      rules:
        max_lines: 300
    grep_workspace_file:
      limit: 50
      rules:
        max_matches: 10
  enable_conversational_memory: true
  enable_session_logging: true
  workspace:
    type: memory
    dir: .
